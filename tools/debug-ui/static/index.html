<!doctype html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>qingsheng debug</title>
  <style>
    :root {
      --bg: #fafaf7;
      --panel: #ffffff;
      --border: #e4e2dc;
      --text: #1e1e1c;
      --muted: #8a8780;
      --accent: #b8461d;
      --accent-soft: #f4e4dc;
      --good: #3c8c3c;
      --warn: #c97a0b;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; }
    button { font: inherit; cursor: pointer; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; }
    button:hover { background: var(--accent-soft); border-color: var(--accent); }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    button.primary:hover { background: #9a3a17; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    input[type=text], textarea, select { font: inherit; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); width: 100%; }
    input[type=text]:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; font-family: inherit; }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 2px; }

    #app { display: flex; height: 100vh; overflow: hidden; }

    #sidebar { width: 260px; min-width: 260px; border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; }
    #sidebar header { padding: 14px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
    #sidebar header .sub { font-size: 11px; color: var(--muted); font-weight: 400; }
    #new-case-btn { width: calc(100% - 24px); margin: 12px; }
    #case-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
    .case-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; }
    .case-item:hover { background: var(--accent-soft); }
    .case-item.active { background: var(--accent-soft); border-color: var(--accent); }
    .case-item .name { font-weight: 500; font-size: 13px; }
    .case-item .meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; margin-top: 2px; }
    .case-item .gold-badge { color: var(--good); font-weight: 600; }

    #main { flex: 1; overflow-y: auto; padding: 20px 24px; }
    #main h2 { margin-top: 0; font-size: 18px; }
    .empty-state { text-align: center; color: var(--muted); padding: 80px 20px; }

    .scenario-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .field-row { display: flex; gap: 12px; margin-bottom: 10px; }
    .field-row > .field { flex: 1; }
    .field label { margin-bottom: 4px; }
    .images-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 0; }
    .images-row img { max-height: 140px; max-width: 120px; border: 1px solid var(--border); border-radius: 4px; object-fit: cover; cursor: pointer; }
    .images-row .thumb { position: relative; }
    .images-row .thumb button.del { position: absolute; top: 2px; right: 2px; padding: 0 5px; font-size: 11px; background: rgba(255,255,255,.9); }
    .upload-btn { display: inline-flex; align-items: center; justify-content: center; height: 140px; width: 100px; border: 1px dashed var(--border); border-radius: 4px; color: var(--muted); cursor: pointer; }
    .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
    .upload-btn input { display: none; }

    .runner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .runner-pane { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; display: flex; flex-direction: column; min-height: 400px; }
    .runner-pane h3 { margin: 0 0 10px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .runner-pane .skill-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .runner-pane .skill-row input { flex: 1; font-family: var(--mono); font-size: 12px; }
    .runner-pane .skill-row select { width: 90px; flex: 0; }
    .runner-pane .actions { display: flex; gap: 8px; margin-bottom: 10px; }
    .runner-pane .output-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-family: var(--mono); }
    .runner-pane .output { flex: 1; background: #faf9f5; border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; white-space: pre-wrap; word-wrap: break-word; font-size: 13px; line-height: 1.55; max-height: 500px; overflow-y: auto; }
    .runner-pane .output.error { background: #fdf2f0; color: #8c2a0a; }
    .runner-pane .output.placeholder { color: var(--muted); font-style: italic; }
    .runner-pane .feedback-row { margin-top: 10px; }
    .runner-pane .feedback-row textarea { font-size: 12px; min-height: 50px; }
    .runner-pane .feedback-row .row-actions { display: flex; gap: 6px; margin-top: 6px; }

    .gold-banner { background: #eff6ea; border: 1px solid #b6d4a8; color: #2d5c24; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 12px; }

    .status-bar { position: fixed; bottom: 0; left: 260px; right: 0; background: var(--panel); border-top: 1px solid var(--border); padding: 6px 16px; font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tag { display: inline-block; background: var(--border); color: var(--text); padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 4px; }
    .tag.gold { background: #ffd84c; color: #5a4100; }
    .tag.wechat { background: #d7e8d0; color: #2d5c24; }

    details summary { cursor: pointer; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    details pre { background: #faf9f5; border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 11px; overflow-x: auto; }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <div>
          测试用例
          <div class="sub" id="case-count"></div>
        </div>
      </header>
      <button id="new-case-btn">+ 新建 case</button>
      <div id="case-list"></div>
    </aside>

    <main id="main">
      <div id="empty" class="empty-state">
        <h2>qingsheng debug ui</h2>
        <p>左边建一个新 case，或者挑一个已有的开始调试。</p>
      </div>

      <div id="editor" style="display:none;">
        <div class="scenario-panel">
          <div class="field-row">
            <div class="field" style="flex:2;">
              <label>case 名称</label>
              <input type="text" id="case-name" placeholder="例如：吴怡彤-lunch-锚定" />
            </div>
            <div class="field">
              <label>平台</label>
              <select id="case-platform">
                <option value="">（未指定）</option>
                <option value="wechat">微信</option>
                <option value="tantan">探探</option>
                <option value="momo">陌陌</option>
                <option value="soul">Soul</option>
                <option value="bumble">Bumble</option>
                <option value="qingteng">青藤之恋</option>
                <option value="tinder">Tinder</option>
                <option value="other">其他</option>
              </select>
            </div>
            <div class="field">
              <label>对方代号</label>
              <input type="text" id="case-target" placeholder="例如：吴怡彤" />
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>怎么认识的 / 关系背景</label>
              <input type="text" id="case-relationship" placeholder="例如：工作认识的同行，聊 AI，未见过面" />
            </div>
          </div>
          <div class="field">
            <label>聊天记录截图 / 素材</label>
            <div class="images-row" id="images-row"></div>
          </div>
          <div class="field" style="margin-top:12px;">
            <label>场景描述 / 用户问题</label>
            <textarea id="case-text" rows="4" placeholder="用户想问什么？目前卡在哪？如果只传截图可以留空"></textarea>
          </div>
          <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
            <button id="save-case-btn" class="primary">保存 case</button>
            <button id="delete-case-btn" style="color:#b8461d;">删除 case</button>
            <div style="flex:1;"></div>
            <span class="tag gold" id="has-gold-tag" style="display:none;">★ 有标准答案</span>
          </div>
        </div>

        <div id="gold-banner" class="gold-banner" style="display:none;"></div>

        <div class="runner-grid">
          <div class="runner-pane" data-side="left">
            <h3>左边 — SKILL A</h3>
            <div class="skill-row">
              <input type="text" class="skill-path" placeholder="/path/to/SKILL.md" />
              <select class="model-select">
                <option value="sonnet">sonnet</option>
                <option value="opus">opus</option>
                <option value="haiku">haiku</option>
              </select>
            </div>
            <div class="actions">
              <button class="run-btn primary">跑这边</button>
              <button class="mark-gold-btn">★ 标为标准答案</button>
              <div style="flex:1;"></div>
              <span class="status-tag"></span>
            </div>
            <div class="output-meta"></div>
            <div class="output placeholder">点"跑这边"开始，或者先点下面的"两边一起跑"</div>
            <div class="feedback-row">
              <label>你的反馈（会存进 case 的 run 记录里）</label>
              <textarea class="feedback-text" placeholder="例如：太长了 / 没问平台 / 话术生硬 / ..."></textarea>
              <div class="row-actions">
                <button class="save-feedback-btn">保存反馈</button>
              </div>
            </div>
          </div>

          <div class="runner-pane" data-side="right">
            <h3>右边 — SKILL B</h3>
            <div class="skill-row">
              <input type="text" class="skill-path" placeholder="/path/to/SKILL.md" />
              <select class="model-select">
                <option value="sonnet">sonnet</option>
                <option value="opus">opus</option>
                <option value="haiku">haiku</option>
              </select>
            </div>
            <div class="actions">
              <button class="run-btn primary">跑这边</button>
              <button class="mark-gold-btn">★ 标为标准答案</button>
              <div style="flex:1;"></div>
              <span class="status-tag"></span>
            </div>
            <div class="output-meta"></div>
            <div class="output placeholder">这边可以放一个改过的 v5 版本，跟左边对比</div>
            <div class="feedback-row">
              <label>你的反馈</label>
              <textarea class="feedback-text" placeholder="..."></textarea>
              <div class="row-actions">
                <button class="save-feedback-btn">保存反馈</button>
              </div>
            </div>
          </div>
        </div>

        <div style="text-align:center; margin:14px 0 30px;">
          <button id="run-both-btn" class="primary">▶ 两边一起跑</button>
        </div>

        <details id="runs-history">
          <summary>历史运行记录</summary>
          <pre id="runs-json"></pre>
        </details>
      </div>
    </main>
  </div>

  <div class="status-bar" id="status-bar">ready</div>

<script>
// --- minimal state ---
const state = {
  cases: [],
  current: null,           // currently loaded full case object
  defaultSkill: "",
};

// --- dom helpers ---
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
const statusBar = $("#status-bar");
function setStatus(msg, spinning=false) {
  statusBar.innerHTML = spinning ? `<span class="spinner"></span>${msg}` : msg;
}

// --- api ---
async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? {"Content-Type": "application/json"} : {},
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`${res.status}: ${txt}`);
  }
  return res.json();
}

async function loadDefaultSkill() {
  const r = await api("GET", "/api/default-skill");
  state.defaultSkill = r.path;
  $$(".skill-path").forEach(i => { if (!i.value) i.value = state.defaultSkill; });
}

async function loadCases() {
  const r = await api("GET", "/api/cases");
  state.cases = r.cases;
  renderCaseList();
}

function renderCaseList() {
  const list = $("#case-list");
  list.innerHTML = "";
  $("#case-count").textContent = `${state.cases.length} 个`;
  if (state.cases.length === 0) {
    list.innerHTML = `<div style="color:var(--muted); font-size:12px; padding: 12px;">还没有 case — 点上面的"+ 新建 case"</div>`;
    return;
  }
  for (const c of state.cases) {
    const el = document.createElement("div");
    el.className = "case-item" + (state.current && state.current.id === c.id ? " active" : "");
    el.innerHTML = `
      <div class="name">${escapeHtml(c.name)}</div>
      <div class="meta">
        ${c.platform ? `<span class="tag ${c.platform}">${c.platform}</span>` : ""}
        ${c.image_count ? `<span>${c.image_count}图</span>` : ""}
        ${c.run_count ? `<span>${c.run_count}次跑</span>` : ""}
        ${c.has_gold ? `<span class="gold-badge">★ gold</span>` : ""}
      </div>
    `;
    el.onclick = () => loadCase(c.id);
    list.appendChild(el);
  }
}

async function loadCase(id) {
  const c = await api("GET", `/api/cases/${id}`);
  state.current = c;
  renderCase();
  renderCaseList(); // refresh active highlight
}

function renderCase() {
  const c = state.current;
  $("#empty").style.display = "none";
  $("#editor").style.display = "block";

  $("#case-name").value = c.name || "";
  $("#case-platform").value = (c.scenario?.metadata?.platform) || "";
  $("#case-target").value = (c.scenario?.metadata?.target_name) || "";
  $("#case-relationship").value = (c.scenario?.metadata?.relationship) || "";
  $("#case-text").value = (c.scenario?.text) || "";

  renderImages();

  // gold banner
  const gb = $("#gold-banner");
  if (c.gold_answer) {
    gb.style.display = "block";
    gb.innerHTML = `★ <strong>这个 case 有标准答案</strong> — 标于 ${c.gold_answer.marked_at}, 基于 <code>${escapeHtml(c.gold_answer.skill_path || "")}</code>. <a href="#" id="show-gold">查看</a>`;
    $("#has-gold-tag").style.display = "inline-block";
  } else {
    gb.style.display = "none";
    $("#has-gold-tag").style.display = "none";
  }

  // clear outputs
  $$(".runner-pane").forEach(pane => {
    pane.querySelector(".output").className = "output placeholder";
    pane.querySelector(".output").textContent = "还没跑";
    pane.querySelector(".output-meta").textContent = "";
    pane.querySelector(".feedback-text").value = "";
    pane.dataset.runIndex = "";
  });

  // runs history
  $("#runs-json").textContent = JSON.stringify(c.runs || [], null, 2);
}

function renderImages() {
  const row = $("#images-row");
  row.innerHTML = "";
  const imgs = state.current?.scenario?.images || [];
  const cid = state.current?.id;
  for (const fn of imgs) {
    const d = document.createElement("div");
    d.className = "thumb";
    d.innerHTML = `
      <img src="/api/cases/${cid}/images/${encodeURIComponent(fn)}"
           onclick="window.open(this.src)" />
      <button class="del" title="删除">×</button>
    `;
    d.querySelector(".del").onclick = async () => {
      if (!confirm(`删除 ${fn}?`)) return;
      const updated = await api("POST", `/api/cases/${cid}/delete-image`, {filename: fn});
      state.current = updated;
      renderImages();
    };
    row.appendChild(d);
  }
  // upload button
  const lbl = document.createElement("label");
  lbl.className = "upload-btn";
  lbl.innerHTML = `+ 加图片<input type="file" multiple accept="image/*" />`;
  lbl.querySelector("input").onchange = handleImageUpload;
  row.appendChild(lbl);
}

async function handleImageUpload(e) {
  if (!state.current || !state.current.id) {
    alert("先保存 case 再上传图片");
    return;
  }
  const files = [...e.target.files];
  if (files.length === 0) return;
  setStatus(`读取 ${files.length} 张图片...`, true);

  const newImages = [];
  for (const f of files) {
    const dataUrl = await fileToDataUrl(f);
    newImages.push({filename: f.name, data_url: dataUrl});
  }
  const updated = await api("POST", "/api/cases", {
    id: state.current.id,
    name: state.current.name,
    scenario: {
      text: $("#case-text").value,
      metadata: collectMetadata(),
      new_images: newImages,
    },
  });
  state.current = updated;
  renderImages();
  setStatus(`加了 ${newImages.length} 张图`);
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function collectMetadata() {
  return {
    platform: $("#case-platform").value,
    target_name: $("#case-target").value,
    relationship: $("#case-relationship").value,
  };
}

async function saveCase() {
  const name = $("#case-name").value.trim() || "untitled";
  const body = {
    id: state.current?.id,
    name,
    scenario: {
      text: $("#case-text").value,
      metadata: collectMetadata(),
    },
  };
  const updated = await api("POST", "/api/cases", body);
  state.current = updated;
  await loadCases();
  setStatus(`已保存 ${updated.id}`);
}

async function newCase() {
  state.current = {
    id: null,
    name: "",
    scenario: {text: "", images: [], metadata: {}},
    runs: [],
  };
  renderCase();
  $("#case-name").focus();
}

async function deleteCurrentCase() {
  if (!state.current?.id) return;
  if (!confirm(`删除 case "${state.current.name}"? 不可恢复。`)) return;
  await api("DELETE", `/api/cases/${state.current.id}`);
  state.current = null;
  $("#editor").style.display = "none";
  $("#empty").style.display = "block";
  await loadCases();
  setStatus("已删除");
}

async function runOne(side) {
  if (!state.current?.id) {
    alert("先保存 case");
    return;
  }
  const pane = $(`.runner-pane[data-side="${side}"]`);
  const skillPath = pane.querySelector(".skill-path").value || state.defaultSkill;
  const model = pane.querySelector(".model-select").value;
  const outEl = pane.querySelector(".output");
  const metaEl = pane.querySelector(".output-meta");
  const statusEl = pane.querySelector(".status-tag");

  outEl.className = "output placeholder";
  outEl.textContent = "跑中...";
  statusEl.innerHTML = `<span class="spinner"></span>跑中`;
  setStatus(`${side} 跑中...`, true);

  try {
    const r = await api("POST", "/api/run", {
      case_id: state.current.id,
      skill_path: skillPath,
      model,
      side,
    });
    state.current = r.case;
    const run = r.run;
    pane.dataset.runIndex = (r.case.runs.length - 1).toString();

    if (run.error) {
      outEl.className = "output error";
      outEl.textContent = `[ERROR] ${run.error}\n\n${run.stderr || run.raw_stdout || ""}`;
    } else {
      outEl.className = "output";
      outEl.textContent = run.output || "(空输出)";
    }
    metaEl.textContent = `${run.model || ""} · ${run.duration_s || 0}s · ${run.timestamp || ""}`;
    statusEl.textContent = run.error ? "❌ 错" : `✓ ${run.duration_s}s`;
    $("#runs-json").textContent = JSON.stringify(r.case.runs, null, 2);
    setStatus(`${side} 完成`);
  } catch (e) {
    outEl.className = "output error";
    outEl.textContent = `[FETCH ERROR] ${e.message}`;
    statusEl.textContent = "❌";
    setStatus(`${side} 挂了: ${e.message}`);
  }
}

async function runBoth() {
  await Promise.all([runOne("left"), runOne("right")]);
}

async function markGold(side) {
  const pane = $(`.runner-pane[data-side="${side}"]`);
  const runIdx = parseInt(pane.dataset.runIndex);
  if (isNaN(runIdx)) { alert("先跑一次"); return; }
  const note = prompt("给这个标准答案加个备注（可选）", "") || "";
  const updated = await api("POST", `/api/cases/${state.current.id}/gold`,
                            {run_index: runIdx, note});
  state.current = updated;
  renderCase();
  await loadCases();
  setStatus(`★ 已标记为 ${state.current.name} 的标准答案`);
}

async function saveFeedback(side) {
  const pane = $(`.runner-pane[data-side="${side}"]`);
  const runIdx = parseInt(pane.dataset.runIndex);
  if (isNaN(runIdx)) { alert("先跑一次"); return; }
  const feedback = pane.querySelector(".feedback-text").value;
  const updated = await api("POST", `/api/cases/${state.current.id}/feedback`,
                            {run_index: runIdx, feedback});
  state.current = updated;
  $("#runs-json").textContent = JSON.stringify(updated.runs, null, 2);
  setStatus("反馈已保存");
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;"})[c]);
}

// --- wire up events ---
document.addEventListener("DOMContentLoaded", async () => {
  $("#new-case-btn").onclick = newCase;
  $("#save-case-btn").onclick = saveCase;
  $("#delete-case-btn").onclick = deleteCurrentCase;
  $("#run-both-btn").onclick = runBoth;
  $$(".runner-pane").forEach(pane => {
    const side = pane.dataset.side;
    pane.querySelector(".run-btn").onclick = () => runOne(side);
    pane.querySelector(".mark-gold-btn").onclick = () => markGold(side);
    pane.querySelector(".save-feedback-btn").onclick = () => saveFeedback(side);
  });
  document.body.addEventListener("click", e => {
    if (e.target.id === "show-gold") {
      e.preventDefault();
      alert(state.current?.gold_answer?.text || "(empty)");
    }
  });

  await loadDefaultSkill();
  await loadCases();
});
</script>
