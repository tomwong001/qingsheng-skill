<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans CJK SC','Source Han Sans SC',-apple-system,BlinkMacSystemFont,sans-serif">
  <!-- phone frame -->
  <rect x="0" y="0" width="360" height="780" rx="28" fill="#ededed"/>

  <!-- status bar -->
  <text x="28" y="32" font-size="14" font-weight="600" fill="#111">17:36</text>
  <rect x="160" y="18" width="44" height="20" rx="10" fill="#111"/>
  <text x="320" y="32" font-size="12" font-weight="600" fill="#111" text-anchor="end">75%</text>

  <!-- header -->
  <rect x="0" y="52" width="360" height="54" fill="#ededed"/>
  <path d="M18 79 L30 70 L30 88 Z" fill="#1a1a1a"/>
  <text x="180" y="86" font-size="17" font-weight="600" fill="#111" text-anchor="middle">小美</text>
  <circle cx="338" cy="79" r="2" fill="#1a1a1a"/>
  <circle cx="330" cy="79" r="2" fill="#1a1a1a"/>
  <circle cx="322" cy="79" r="2" fill="#1a1a1a"/>
  <line x1="0" y1="106" x2="360" y2="106" stroke="#d0d0d0" stroke-width="0.5"/>

  <!-- chat area bg -->
  <rect x="0" y="106" width="360" height="620" fill="#ededed"/>

  <!-- time divider -->
  <rect x="148" y="122" width="64" height="20" rx="3" fill="#c4c4c4"/>
  <text x="180" y="136" font-size="11" fill="#fff" text-anchor="middle">周一 10:32</text>

  <!-- me msg 1 (right, green) -->
  <rect x="102" y="160" width="216" height="54" rx="6" fill="#95ec69"/>
  <text x="114" y="182" font-size="15" fill="#111">周末去了你之前推荐的那家咖啡馆</text>
  <text x="114" y="203" font-size="15" fill="#111">拿铁确实不错 ☕</text>
  <rect x="322" y="160" width="32" height="32" rx="4" fill="#b8c7e0"/>
  <text x="338" y="182" font-size="16" fill="#fff" text-anchor="middle">我</text>

  <!-- her msg 1 (left, white) -->
  <rect x="42" y="230" width="196" height="34" rx="6" fill="#ffffff"/>
  <text x="54" y="253" font-size="15" fill="#111">哈哈是吧！我就说那家很好喝</text>
  <rect x="6" y="230" width="32" height="32" rx="4" fill="#f2c94c"/>
  <text x="22" y="252" font-size="16" fill="#fff" text-anchor="middle">美</text>

  <!-- me msg 2 -->
  <rect x="162" y="280" width="156" height="34" rx="6" fill="#95ec69"/>
  <text x="174" y="303" font-size="15" fill="#111">下次一起去，我请你 😊</text>
  <rect x="322" y="280" width="32" height="32" rx="4" fill="#b8c7e0"/>
  <text x="338" y="302" font-size="16" fill="#fff" text-anchor="middle">我</text>

  <!-- her msg 2 -->
  <rect x="42" y="330" width="120" height="34" rx="6" fill="#ffffff"/>
  <text x="54" y="353" font-size="15" fill="#111">好呀 有机会的</text>
  <rect x="6" y="330" width="32" height="32" rx="4" fill="#f2c94c"/>
  <text x="22" y="352" font-size="16" fill="#fff" text-anchor="middle">美</text>

  <!-- me msg 3 -->
  <rect x="158" y="380" width="160" height="34" rx="6" fill="#95ec69"/>
  <text x="170" y="403" font-size="15" fill="#111">这周六下午有空吗？</text>
  <rect x="322" y="380" width="32" height="32" rx="4" fill="#b8c7e0"/>
  <text x="338" y="402" font-size="16" fill="#fff" text-anchor="middle">我</text>

  <!-- her msg 3 -->
  <rect x="42" y="430" width="158" height="54" rx="6" fill="#ffffff"/>
  <text x="54" y="452" font-size="15" fill="#111">周六可能有事诶</text>
  <text x="54" y="473" font-size="15" fill="#111">下次吧</text>
  <rect x="6" y="430" width="32" height="32" rx="4" fill="#f2c94c"/>
  <text x="22" y="452" font-size="16" fill="#fff" text-anchor="middle">美</text>

  <!-- me msg 4 -->
  <rect x="140" y="500" width="178" height="34" rx="6" fill="#95ec69"/>
  <text x="152" y="523" font-size="15" fill="#111">好的 你什么时候方便？</text>
  <rect x="322" y="500" width="32" height="32" rx="4" fill="#b8c7e0"/>
  <text x="338" y="522" font-size="16" fill="#fff" text-anchor="middle">我</text>

  <!-- her msg 4 -->
  <rect x="42" y="550" width="184" height="54" rx="6" fill="#ffffff"/>
  <text x="54" y="572" font-size="15" fill="#111">最近挺忙的</text>
  <text x="54" y="593" font-size="15" fill="#111">到时候再说吧 😓</text>
  <rect x="6" y="550" width="32" height="32" rx="4" fill="#f2c94c"/>
  <text x="22" y="572" font-size="16" fill="#fff" text-anchor="middle">美</text>

  <!-- input bar -->
  <rect x="0" y="720" width="360" height="60" fill="#f4f4f4"/>
  <line x1="0" y1="720" x2="360" y2="720" stroke="#d0d0d0" stroke-width="0.5"/>
  <circle cx="28" cy="750" r="12" fill="none" stroke="#444" stroke-width="1.4"/>
  <line x1="22" y1="750" x2="34" y2="750" stroke="#444" stroke-width="1.4"/>
  <rect x="50" y="734" width="232" height="32" rx="4" fill="#fff" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="166" y="755" font-size="14" fill="#888" text-anchor="middle">按住 说话</text>
  <circle cx="302" cy="750" r="12" fill="none" stroke="#444" stroke-width="1.4"/>
  <text x="302" y="755" font-size="14" fill="#444" text-anchor="middle">☺</text>
  <circle cx="334" cy="750" r="12" fill="none" stroke="#444" stroke-width="1.4"/>
  <text x="334" y="756" font-size="18" fill="#444" text-anchor="middle">+</text>
</svg>
