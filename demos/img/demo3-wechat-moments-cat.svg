<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans CJK SC','Source Han Sans SC',-apple-system,BlinkMacSystemFont,sans-serif">
  <!-- phone frame -->
  <rect x="0" y="0" width="360" height="640" rx="28" fill="#ededed"/>

  <!-- status bar -->
  <text x="28" y="32" font-size="14" font-weight="600" fill="#111">17:42</text>
  <rect x="160" y="18" width="44" height="20" rx="10" fill="#111"/>
  <text x="320" y="32" font-size="12" font-weight="600" fill="#111" text-anchor="end">73%</text>

  <!-- header -->
  <rect x="0" y="52" width="360" height="54" fill="#ededed"/>
  <path d="M18 79 L30 70 L30 88 Z" fill="#1a1a1a"/>
  <text x="180" y="86" font-size="17" font-weight="600" fill="#111" text-anchor="middle">朋友圈</text>
  <rect x="318" y="70" width="22" height="18" rx="3" fill="none" stroke="#1a1a1a" stroke-width="1.8"/>
  <circle cx="329" cy="79" r="4" fill="none" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="0" y1="106" x2="360" y2="106" stroke="#d0d0d0" stroke-width="0.5"/>

  <!-- post card -->
  <rect x="0" y="106" width="360" height="480" fill="#ffffff"/>

  <!-- avatar + name -->
  <rect x="16" y="124" width="42" height="42" rx="5" fill="#f2c94c"/>
  <text x="37" y="152" font-size="20" font-weight="600" fill="#fff" text-anchor="middle">美</text>
  <text x="68" y="142" font-size="15" font-weight="600" fill="#576b95">小美</text>

  <!-- post text -->
  <text x="68" y="166" font-size="15" fill="#111">这小家伙今天特别粘人 🐾</text>

  <!-- photo frame with cat -->
  <rect x="68" y="182" width="200" height="200" rx="6" fill="#f4d5a8"/>

  <!-- decorative background dots in photo -->
  <circle cx="90" cy="205" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="244" cy="210" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="360" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="240" cy="355" r="4" fill="#fff" opacity="0.5"/>

  <!-- cat ears (outer) -->
  <path d="M128 236 L144 196 L163 234 Z" fill="#8b6f47"/>
  <path d="M173 234 L192 196 L208 236 Z" fill="#8b6f47"/>

  <!-- cat ears (inner) -->
  <path d="M138 228 L146 208 L156 228 Z" fill="#e8a87c"/>
  <path d="M180 228 L190 208 L198 228 Z" fill="#e8a87c"/>

  <!-- cat head -->
  <ellipse cx="168" cy="296" rx="62" ry="58" fill="#8b6f47"/>

  <!-- stripes on forehead -->
  <path d="M150 248 Q155 258 150 268" fill="none" stroke="#6b5434" stroke-width="2" stroke-linecap="round"/>
  <path d="M168 246 Q168 258 168 268" fill="none" stroke="#6b5434" stroke-width="2" stroke-linecap="round"/>
  <path d="M186 248 Q181 258 186 268" fill="none" stroke="#6b5434" stroke-width="2" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="148" cy="288" rx="8" ry="11" fill="#111"/>
  <ellipse cx="188" cy="288" rx="8" ry="11" fill="#111"/>
  <circle cx="150" cy="283" r="2.5" fill="#fff"/>
  <circle cx="190" cy="283" r="2.5" fill="#fff"/>

  <!-- nose -->
  <path d="M161 302 L175 302 L168 310 Z" fill="#e8a87c"/>

  <!-- mouth -->
  <path d="M168 310 Q162 320 156 316" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <path d="M168 310 Q174 320 180 316" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"/>

  <!-- whiskers -->
  <line x1="114" y1="302" x2="140" y2="304" stroke="#4a3928" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="114" y1="312" x2="140" y2="310" stroke="#4a3928" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="196" y1="304" x2="222" y2="302" stroke="#4a3928" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="196" y1="310" x2="222" y2="312" stroke="#4a3928" stroke-width="1.4" stroke-linecap="round"/>

  <!-- cheek blush -->
  <ellipse cx="128" cy="304" rx="7" ry="5" fill="#ff9b7a" opacity="0.55"/>
  <ellipse cx="208" cy="304" rx="7" ry="5" fill="#ff9b7a" opacity="0.55"/>

  <!-- timestamp -->
  <text x="68" y="404" font-size="12" fill="#888">刚刚 · 上海</text>

  <!-- like/comment button pill -->
  <rect x="240" y="392" width="70" height="24" rx="4" fill="#f4f4f4"/>
  <!-- heart icon -->
  <path d="M254 403 C254 400 257 398 259 401 C261 398 264 400 264 403 C264 407 259 411 259 411 C259 411 254 407 254 403 Z" fill="none" stroke="#666" stroke-width="1.4"/>
  <!-- divider dot -->
  <circle cx="275" cy="404" r="1" fill="#999"/>
  <!-- comment bubble -->
  <path d="M284 400 L298 400 Q302 400 302 404 L302 407 Q302 411 298 411 L290 411 L286 414 L286 411 L284 411 Q282 411 282 409 L282 402 Q282 400 284 400 Z" fill="none" stroke="#666" stroke-width="1.4"/>

  <!-- liked-by / comments section bg -->
  <rect x="60" y="426" width="276" height="108" rx="4" fill="#f5f5f5"/>

  <!-- heart + likes row -->
  <path d="M74 444 C74 441 77 439 79 442 C81 439 84 441 84 444 C84 448 79 452 79 452 C79 452 74 448 74 444 Z" fill="#666"/>
  <text x="92" y="450" font-size="13" fill="#576b95">朋友A, 朋友B, 朋友C</text>

  <!-- comment divider -->
  <line x1="72" y1="464" x2="324" y2="464" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- existing comment -->
  <text x="74" y="484" font-size="13" font-weight="600" fill="#576b95">朋友A：</text>
  <text x="123" y="484" font-size="13" fill="#111">也太萌了吧 😍</text>

  <!-- your comment in progress (highlighted) -->
  <text x="74" y="510" font-size="13" font-weight="600" fill="#576b95">我：</text>
  <text x="100" y="510" font-size="13" fill="#111">布偶的眼神太有戏了</text>
  <!-- typing cursor -->
  <rect x="232" y="499" width="2" height="14" fill="#07c160">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- comment input bar at bottom -->
  <rect x="0" y="586" width="360" height="54" fill="#f4f4f4"/>
  <line x1="0" y1="586" x2="360" y2="586" stroke="#d0d0d0" stroke-width="0.5"/>
  <rect x="16" y="598" width="270" height="32" rx="16" fill="#fff" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="28" y="618" font-size="13" fill="#888">评论…</text>
  <circle cx="304" cy="614" r="12" fill="none" stroke="#888" stroke-width="1.4"/>
  <text x="304" y="619" font-size="13" fill="#666" text-anchor="middle">☺</text>
  <rect x="322" y="602" width="28" height="24" rx="4" fill="#07c160"/>
  <text x="336" y="619" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">发送</text>
</svg>
