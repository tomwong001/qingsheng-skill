<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans CJK SC','Source Han Sans SC',-apple-system,BlinkMacSystemFont,sans-serif">
  <!-- phone frame -->
  <rect x="0" y="0" width="360" height="780" rx="28" fill="#ffffff"/>

  <!-- status bar -->
  <text x="28" y="32" font-size="14" font-weight="600" fill="#111">22:39</text>
  <rect x="160" y="18" width="44" height="20" rx="10" fill="#111"/>
  <text x="320" y="32" font-size="12" font-weight="600" fill="#111" text-anchor="end">72%</text>

  <!-- header -->
  <rect x="0" y="52" width="360" height="64" fill="#ffffff"/>
  <path d="M18 86 L30 77 L30 95 Z" fill="#222"/>
  <circle cx="58" cy="84" r="18" fill="#f0e6c8"/>
  <text x="58" y="90" font-size="14" fill="#b08040" text-anchor="middle">👤</text>
  <text x="88" y="90" font-size="17" font-weight="600" fill="#111">Jiayi</text>
  <!-- right icons -->
  <circle cx="278" cy="84" r="10" fill="none" stroke="#333" stroke-width="1.4"/>
  <path d="M274 80 L282 84 L274 88 Z" fill="#333"/>
  <rect x="298" y="74" width="20" height="20" rx="3" fill="none" stroke="#333" stroke-width="1.4"/>
  <circle cx="332" cy="78" r="1.8" fill="#333"/>
  <circle cx="332" cy="84" r="1.8" fill="#333"/>
  <circle cx="332" cy="90" r="1.8" fill="#333"/>

  <line x1="0" y1="116" x2="360" y2="116" stroke="#eee" stroke-width="0.5"/>

  <!-- chat area bg -->
  <rect x="0" y="116" width="360" height="604" fill="#ffffff"/>

  <!-- date divider -->
  <text x="180" y="144" font-size="11" fill="#999" text-anchor="middle">2026 年 4 月 6 日</text>

  <!-- her msg 1 -->
  <rect x="16" y="160" width="268" height="58" rx="18" fill="#f1f1f1"/>
  <text x="30" y="184" font-size="15" fill="#111">你那张爬山的照片是哪里拍的？</text>
  <text x="30" y="206" font-size="15" fill="#111">看起来好酷</text>

  <!-- me msg 1 (right, yellow) -->
  <rect x="92" y="234" width="252" height="58" rx="18" fill="#fee868"/>
  <text x="106" y="258" font-size="15" fill="#111">四姑娘山大峰，三天前刚下来 ⛰️</text>
  <text x="106" y="280" font-size="15" fill="#111">爬的时候想放弃无数次</text>

  <!-- her msg 2 -->
  <rect x="16" y="308" width="172" height="36" rx="18" fill="#f1f1f1"/>
  <text x="30" y="332" font-size="15" fill="#111">哇 听起来就好累</text>

  <!-- me msg 2 -->
  <rect x="76" y="360" width="268" height="58" rx="18" fill="#fee868"/>
  <text x="90" y="384" font-size="15" fill="#111">下来之后拍照又觉得值了</text>
  <text x="90" y="406" font-size="15" fill="#111">你是户外型还是咖啡馆型？</text>

  <!-- her msg 3 -->
  <rect x="16" y="434" width="232" height="58" rx="18" fill="#f1f1f1"/>
  <text x="30" y="458" font-size="15" fill="#111">都喜欢 但最近更宅一点</text>
  <text x="30" y="480" font-size="15" fill="#111">想出去又懒得动 🥲</text>

  <!-- me msg 3 -->
  <rect x="104" y="508" width="240" height="58" rx="18" fill="#fee868"/>
  <text x="118" y="532" font-size="15" fill="#111">那下周六我们去郊区喝咖啡</text>
  <text x="118" y="554" font-size="15" fill="#111">一半户外一半宅，刚好</text>

  <!-- her msg 4 -->
  <rect x="16" y="582" width="140" height="36" rx="18" fill="#f1f1f1"/>
  <text x="30" y="606" font-size="15" fill="#111">哈哈 可以啊 😄</text>

  <!-- input bar -->
  <rect x="0" y="720" width="360" height="60" fill="#ffffff"/>
  <line x1="0" y1="720" x2="360" y2="720" stroke="#eee" stroke-width="0.5"/>
  <circle cx="28" cy="750" r="12" fill="none" stroke="#444" stroke-width="1.4"/>
  <rect x="22" y="744" width="12" height="10" rx="1.5" fill="none" stroke="#444" stroke-width="1.4"/>
  <rect x="48" y="732" width="230" height="36" rx="18" fill="#f6f6f6"/>
  <text x="64" y="754" font-size="15" fill="#999">Aa</text>
  <text x="300" y="755" font-size="11" font-weight="700" fill="#444" text-anchor="middle">GIF</text>
  <circle cx="332" cy="750" r="10" fill="none" stroke="#444" stroke-width="1.4"/>
</svg>
